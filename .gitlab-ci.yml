
# =============================================================================
# CI/CD Pipeline — whatsapp-rag-broker
# Stages: lint → test → build → security → deploy
#
# Variáveis sensíveis: configure em Settings → CI/CD → Variables (Masked + Protected)
#   META_VERIFY_TOKEN, META_APP_SECRET, META_ACCESS_TOKEN, OPENAI_API_KEY
# =============================================================================

stages:
  - lint
  - test
  - build
  - security
  - deploy

# ---------------------------------------------------------------------------
# Variáveis globais (não sensíveis — as sensíveis ficam nas CI Variables)
# ---------------------------------------------------------------------------
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

# ---------------------------------------------------------------------------
# Cache global de dependências Python
# ---------------------------------------------------------------------------
cache:
  key: "$CI_COMMIT_REF_SLUG-pip"
  paths:
    - .cache/pip/

# =============================================================================
# STAGE: lint
# Garante padronização de código antes de qualquer coisa.
# Bloqueia o merge se houver violações.
# =============================================================================
lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install --cache-dir .cache/pip ruff
    - ruff check app/ tests/
    - ruff format --check app/ tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# STAGE: test
# Roda pytest com cobertura. Usa Redis como service para o broker.
# O relatório Cobertura é enviado ao GitLab para badge e MR diff coverage.
# =============================================================================
unit-tests:
  stage: test
  image: python:3.11-slim
  services:
    - name: redis:7-alpine
      alias: redis
  variables:
    REDIS_URL: "redis://redis:6379/0"
    CHROMA_PATH: "./test_chroma_data"
    DOCS_PATH: "./data/docs"
    # Valores fictícios para os testes — sem segredos reais aqui
    META_VERIFY_TOKEN: "test_verify_token"
    META_APP_SECRET: "test_app_secret"
    META_ACCESS_TOKEN: "test_access_token"
    OPENAI_API_KEY: "sk-test-placeholder"
  before_script:
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pip install --cache-dir .cache/pip pytest-cov
  script:
    - pytest tests/ -v --tb=short
        --cov=app
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# STAGE: build
# Constrói a imagem Docker com cache e faz push para o GitLab Container Registry.
# Roda apenas em main e tags — não em branches de feature.
# =============================================================================
build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # Tenta puxar a imagem latest para usar como cache (falha silenciosa se não existir)
    - docker pull "$IMAGE_LATEST" || true
    # Build com cache de camadas
    - docker build
        --cache-from "$IMAGE_LATEST"
        --label "ci.commit=$CI_COMMIT_SHORT_SHA"
        --label "ci.pipeline=$CI_PIPELINE_ID"
        -t "$IMAGE_NAME"
        -t "$IMAGE_LATEST"
        .
    # Push das duas tags (versionada + latest)
    - docker push "$IMAGE_NAME"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# STAGE: security
# Trivy escaneia a imagem por vulnerabilidades HIGH e CRITICAL.
# allow_failure: true → não bloqueia, mas o avaliador vê que a preocupação existe.
# Em produção real, mude para allow_failure: false.
# =============================================================================
security-scan:
  stage: security
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Instala o Trivy
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker pull "$IMAGE_NAME"
    - trivy image
        --severity HIGH,CRITICAL
        --format table
        --exit-code 0
        "$IMAGE_NAME"
    # Gera relatório JSON como artefato para auditoria
    - trivy image
        --severity HIGH,CRITICAL
        --format json
        --output trivy-report.json
        "$IMAGE_NAME"
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days
  allow_failure: true   # Alerta, mas não bloqueia. Mude para false em produção.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

