# =============================================================================
# GitHub Actions CI/CD — whatsapp-rag-broker
# Stages: lint → test → build → security → deploy
#
# Secrets: configure em Settings → Secrets and variables → Actions
#   META_VERIFY_TOKEN, META_APP_SECRET, META_ACCESS_TOKEN, OPENAI_API_KEY
#   GHCR usa GITHUB_TOKEN automático (sem configuração extra)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ===========================================================================
  # JOB: lint
  # Ruff: linting + verificação de formatação.
  # Bloqueia o PR se houver violações.
  # ===========================================================================
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check app/ tests/

      - name: Check formatting
        run: ruff format --check app/ tests/

  # ===========================================================================
  # JOB: test
  # pytest com cobertura. Redis roda como service container.
  # O relatório coverage.xml é enviado ao GitHub como artefato
  # e pode ser integrado ao Codecov (gratuito para repos públicos).
  # ===========================================================================
  test:
    name: Unit Tests (pytest-cov)
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0
      CHROMA_PATH: ./test_chroma_data
      DOCS_PATH: ./data/docs
      # Valores fictícios para testes — sem segredos reais aqui
      META_VERIFY_TOKEN: test_verify_token
      META_APP_SECRET: test_app_secret
      META_ACCESS_TOKEN: test_access_token
      OPENAI_API_KEY: sk-test-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      # Opcional: integração com Codecov (gratuito para repos públicos)
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: coverage.xml
      #     fail_ci_if_error: false

  # ===========================================================================
  # JOB: build
  # Docker Buildx com cache via GitHub Actions Cache.
  # Push para o GitHub Container Registry (GHCR) — gratuito para repos públicos.
  # Roda apenas em push para main e em tags.
  # ===========================================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write  # Necessário para push no GHCR

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gera tags automáticas: latest, sha-<short>, v1.0.0 (se for tag)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de camadas entre pipelines (reduz tempo de build)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB: security
  # Trivy escaneia a imagem por vulnerabilidades HIGH e CRITICAL.
  # Gera relatório SARIF integrado ao GitHub Security tab (aba nativa do GitHub).
  # allow_failure equivalente: continue-on-error: true
  # ===========================================================================
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    continue-on-error: true  # Alerta, mas não bloqueia. Remova em produção.

    permissions:
      contents: read
      security-events: write  # Necessário para upload do SARIF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"  # Mude para "1" em produção para bloquear o pipeline

      # Envia resultado para a aba "Security" do GitHub (Code scanning alerts)
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.sarif
          retention-days: 30

  # ===========================================================================
